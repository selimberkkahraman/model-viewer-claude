<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stil — 3D Collection</title>

  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:       #1849A9;
      --blue-light: #EEF3FF;
      --blue-glow:  rgba(24,73,169,0.13);
      --white:      #FFFFFF;
      --bg:         #F5F7FC;
      --text:       #131B2E;
      --muted:      #7B87A1;
      --border:     rgba(24,73,169,0.10);
      --panel-w:    272px;
      --ease:       cubic-bezier(0.4,0,0.2,1);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Outfit', sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    /* ── TOPBAR ─────────────────────────────────── */
    #topbar {
      position: fixed;
      top: 0; left: 0;
      right: var(--panel-w);
      height: 60px;
      display: flex; align-items: center;
      padding: 0 26px;
      z-index: 30;
      pointer-events: none;
    }

    .brand {
      display: flex; align-items: center; gap: 10px;
      pointer-events: all;
    }

    .brand-mark {
      width: 33px; height: 33px;
      background: var(--blue);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
    }

    .brand-mark svg { width: 17px; height: 17px; fill: #fff; }

    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px; font-weight: 500;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--text);
    }

    /* ── VIEWER ─────────────────────────────────── */
    #viewer-wrap {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      right: var(--panel-w);
    }

    model-viewer {
      width: 100%; height: 100%;
      background: #F6F8FC;
      viewer.orientation = '0deg 75deg 0deg';
      --progress-bar-color: var(--blue);
      --progress-mask: var(--blue-light);
    }

    /* ── MODEL INFO ──────────────────────────────── */
    #model-info {
      position: fixed;
      bottom: 96px; left: 26px;
      z-index: 20;
      pointer-events: none;
    }

    .info-tag {
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--blue); margin-bottom: 4px;
    }

    .info-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 40px; font-weight: 400;
      line-height: 1; color: var(--text);
      margin-bottom: 4px;
    }

    .info-sub {
      font-size: 13px; font-weight: 300;
      color: var(--muted); letter-spacing: 0.04em;
    }

    /* ── ENVIRONMENT BAR ─────────────────────────── */
    #env-bar {
      position: fixed;
      bottom: 26px; left: 26px;
      right: calc(var(--panel-w) + 26px);
      z-index: 20;
      display: flex; align-items: center; gap: 7px;
      overflow-x: auto; scrollbar-width: none;
    }

    #env-bar::-webkit-scrollbar { display: none; }

    .env-label {
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--muted); flex-shrink: 0; margin-right: 2px;
    }

    .env-btn {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 7px;
      padding: 7px 12px 7px 8px;
      border-radius: 100px;
      border: 1.5px solid var(--border);
      background: rgba(255,255,255,0.84);
      backdrop-filter: blur(10px);
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-size: 12px; font-weight: 500;
      color: var(--muted); white-space: nowrap;
      box-shadow: 0 2px 8px rgba(14,30,80,0.06);
      transition: all 0.22s var(--ease);
      outline: none;
    }

    .env-btn:hover {
      border-color: rgba(24,73,169,0.32);
      color: var(--blue);
      background: var(--blue-light);
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(14,30,80,0.10);
    }

    .env-btn.active {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
      box-shadow: 0 4px 16px rgba(24,73,169,0.30);
    }

    .env-swatch {
      width: 19px; height: 19px;
      border-radius: 50%; flex-shrink: 0;
      border: 1.5px solid rgba(0,0,0,0.08);
    }

    /* HDR globe icon */
    .env-globe {
      width: 19px; height: 19px;
      border-radius: 50%; flex-shrink: 0;
      border: 1.5px solid rgba(0,0,0,0.08);
      background: linear-gradient(135deg,#b8cce8,#dde8f4 55%,#c4d4e8);
      display: flex; align-items: center; justify-content: center;
    }

    .env-globe svg { width: 11px; height: 11px; }

    /* ── PANEL ───────────────────────────────────── */
    #panel {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: var(--panel-w);
      display: flex; flex-direction: column;
      background: rgba(255,255,255,0.94);
      backdrop-filter: blur(20px) saturate(180%);
      border-left: 1px solid var(--border);
      box-shadow: -5px 0 32px rgba(14,30,80,0.07);
      z-index: 25;
    }

    .panel-head {
      padding: 20px 15px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .panel-title {
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 2px;
    }

    #panel-count {
      font-family: 'Cormorant Garamond', serif;
      font-size: 19px; font-weight: 500; color: var(--text);
      margin-bottom: 12px;
    }

    #panel-count em { color: var(--blue); font-style: normal; }

    /* Search */
    .search-wrap { position: relative; }

    .search-wrap svg {
      position: absolute; left: 9px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted); pointer-events: none;
    }

    .search-wrap input {
      width: 100%;
      padding: 8px 10px 8px 29px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      font-family: 'Outfit', sans-serif;
      font-size: 12px; color: var(--text);
      outline: none;
      transition: all 0.2s var(--ease);
    }

    .search-wrap input:focus {
      border-color: var(--blue);
      background: #fff;
      box-shadow: 0 0 0 3px var(--blue-glow);
    }

    .search-wrap input::placeholder { color: var(--muted); }

    /* Grid */
    #model-grid {
      flex: 1;
      overflow-y: auto;
      padding: 11px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      align-content: start;
      scrollbar-width: thin;
      scrollbar-color: rgba(24,73,169,0.14) transparent;
    }

    #model-grid::-webkit-scrollbar { width: 3px; }
    #model-grid::-webkit-scrollbar-thumb {
      background: rgba(24,73,169,0.16);
      border-radius: 3px;
    }

    .model-card {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      background: var(--bg);
      aspect-ratio: 1 / 0.82;
      transition: all 0.22s var(--ease);
      padding: 0; outline: none;
      display: block;
    }

    .model-card:hover {
      border-color: rgba(24,73,169,0.24);
      box-shadow: 0 4px 16px rgba(24,73,169,0.09);
      transform: translateY(-2px);
    }

    .model-card.active {
      border-color: var(--blue);
      box-shadow: 0 0 0 1px var(--blue),
                  0 4px 16px rgba(24,73,169,0.16);
    }

    .model-card img {
      width: 100%; height: 100%;
      object-fit: contain;
      padding: 5px;
      display: block;
      transition: transform 0.32s var(--ease);
    }

    .model-card:hover img { transform: scale(1.05); }

    .card-label {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 18px 7px 5px;
      background: linear-gradient(to top, rgba(255,255,255,0.97), transparent);
      font-size: 10px; font-weight: 500;
      color: var(--text); text-align: center;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* Active dot indicator */
    .model-card.active::after {
      content: '';
      position: absolute; top: 6px; right: 6px;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--blue);
      box-shadow: 0 0 0 2px #fff;
    }

    /* Shimmer while GLB loads */
    .model-card.loading::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(24,73,169,0.07) 50%,
        transparent 100%
      );
      animation: shimmer 1.3s infinite;
      z-index: 2;
    }

    /* ── LOADING RING ─────────────────────────────── */
    #loading-ring {
      position: fixed;
      /* center inside viewer area, not full viewport */
      top: 50%;
      left: calc((100vw - var(--panel-w)) / 2);
      transform: translate(-50%, -50%);
      z-index: 15;
      opacity: 0;
      transition: opacity 0.25s var(--ease);
      pointer-events: none;
    }

    #loading-ring.show { opacity: 1; }

    .ring {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 3px solid var(--blue-light);
      border-top-color: var(--blue);
      animation: spin 0.72s linear infinite;
    }

    /* ── ANIMATIONS ──────────────────────────────── */
    @keyframes spin    { to { transform: rotate(360deg); } }

    @keyframes shimmer {
      from { transform: translateX(-100%); }
      to   { transform: translateX(100%);  }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── MOBILE ──────────────────────────────────── */
    @media (max-width: 680px) {
      :root { --panel-w: 0px; }

      #viewer-wrap { bottom: 200px; }

      #panel {
        top: auto; height: 200px; width: 100%;
        border-left: none; border-top: 1px solid var(--border);
      }

      #model-info { bottom: 214px; }
      #env-bar    { right: 12px; bottom: 212px; }

      #loading-ring { left: 50%; }
    }
  </style>
</head>

<body>

  <!-- TOPBAR -->
  <div id="topbar">
    <div class="brand">
      <div class="brand-mark">
        <!-- sofa silhouette icon -->
        <svg viewBox="0 0 18 13" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="4.5" width="14" height="6.5" rx="2"/>
          <rect x="0.5" y="6.5" width="2.5" height="4.5" rx="1.25"/>
          <rect x="15" y="6.5" width="2.5" height="4.5" rx="1.25"/>
          <rect x="3.5" y="2.5" width="11" height="3.5" rx="1.2"/>
        </svg>
      </div>
      <span class="brand-name">Stil</span>
    </div>
  </div>

  <!-- MODEL VIEWER -->
  <div id="viewer-wrap">
    <model-viewer
      id="mv"
      camera-controls
      auto-rotate
      auto-rotate-delay="2500"
      rotation-per-second="10deg"
      touch-action="pan-y"
      shadow-intensity="0"
      shadow-softness="0.6"
      ar
      ar-modes="webxr scene-viewer quick-look"
    ></model-viewer>
  </div>

  <!-- LOADING RING -->
  <div id="loading-ring"><div class="ring"></div></div>

  <!-- MODEL INFO (bottom-left) -->
  <div id="model-info">
    <div class="info-tag">Collection</div>
    <div class="info-name" id="info-name">—</div>
    <div class="info-sub"  id="info-sub" >Select a model</div>
  </div>

  <!-- ENVIRONMENT BAR (bottom) -->
  <div id="env-bar"></div>

  <!-- RIGHT PANEL -->
  <div id="panel">
    <div class="panel-head">
      <div class="panel-title">Models</div>
      <div id="panel-count">20 <em>pieces</em></div>
      <div class="search-wrap">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
          <circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M10.5 10.5 L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <input type="text" id="search" placeholder="Search models…" autocomplete="off">
      </div>
    </div>
    <div id="model-grid"></div>
  </div>

  <script>
  // ─────────────────────────────────────────────────────────
  //  MODEL DATA
  //  Paths match your existing folder structure exactly:
  //    images/thumbs/XX.jpg  →  shown in the right panel
  //    images/fulls/XX.jpg   →  poster shown while GLB loads
  //    models/modelXX.glb    →  the 3D model
  // ─────────────────────────────────────────────────────────
  const MODELS = [
    { id:1,  name:"Stil Sofa",        sub:"Model 01", thumb:"images/thumbs/01.jpg", poster:"images/fulls/01.jpg", src:"models/model01.glb" },
    { id:2,  name:"Stil Armchair",    sub:"Model 02", thumb:"images/thumbs/02.jpg", poster:"images/fulls/02.jpg", src:"models/model02.glb" },
    { id:3,  name:"Aura Sofa",        sub:"Model 03", thumb:"images/thumbs/03.jpg", poster:"images/fulls/03.jpg", src:"models/model03.glb" },
    { id:4,  name:"Aura Armchair",    sub:"Model 04", thumb:"images/thumbs/04.jpg", poster:"images/fulls/04.jpg", src:"models/model04.glb" },
    { id:5,  name:"Soho Sofa",        sub:"Model 05", thumb:"images/thumbs/05.jpg", poster:"images/fulls/05.jpg", src:"models/model05.glb" },
    { id:6,  name:"Soho Armchair",    sub:"Model 06", thumb:"images/thumbs/06.jpg", poster:"images/fulls/06.jpg", src:"models/model06.glb" },
    { id:7,  name:"Porto Sofa",       sub:"Model 07", thumb:"images/thumbs/07.jpg", poster:"images/fulls/07.jpg", src:"models/model07.glb" },
    { id:8,  name:"Porto Armchair",   sub:"Model 08", thumb:"images/thumbs/08.jpg", poster:"images/fulls/08.jpg", src:"models/model08.glb" },
    { id:9,  name:"Tokyo Sofa",       sub:"Model 09", thumb:"images/thumbs/09.jpg", poster:"images/fulls/09.jpg", src:"models/model09.glb" },
    { id:10, name:"Tokyo Relax Sofa", sub:"Model 10", thumb:"images/thumbs/10.jpg", poster:"images/fulls/10.jpg", src:"models/model10.glb" },
    { id:11, name:"Tokyo Armchair",   sub:"Model 11", thumb:"images/thumbs/11.jpg", poster:"images/fulls/11.jpg", src:"models/model11.glb" },
    { id:12, name:"Garda Sofa",       sub:"Model 12", thumb:"images/thumbs/12.jpg", poster:"images/fulls/12.jpg", src:"models/model12.glb" },
    { id:13, name:"Garda Relax Sofa", sub:"Model 13", thumb:"images/thumbs/13.jpg", poster:"images/fulls/13.jpg", src:"models/model13.glb" },
    { id:14, name:"Garda Armchair",   sub:"Model 14", thumb:"images/thumbs/14.jpg", poster:"images/fulls/14.jpg", src:"models/model14.glb" },
    { id:15, name:"West Sofa",        sub:"Model 15", thumb:"images/thumbs/15.jpg", poster:"images/fulls/15.jpg", src:"models/model15.glb" },
    { id:16, name:"West Relax Sofa",  sub:"Model 16", thumb:"images/thumbs/16.jpg", poster:"images/fulls/16.jpg", src:"models/model16.glb" },
    { id:17, name:"West Armchair",    sub:"Model 17", thumb:"images/thumbs/17.jpg", poster:"images/fulls/17.jpg", src:"models/model17.glb" },
    { id:18, name:"Kano Sofa",        sub:"Model 18", thumb:"images/thumbs/18.jpg", poster:"images/fulls/18.jpg", src:"models/model18.glb" },
    { id:19, name:"Kano Relax Sofa",  sub:"Model 19", thumb:"images/thumbs/19.jpg", poster:"images/fulls/19.jpg", src:"models/model19.glb" },
    { id:20, name:"Kano Armchair",    sub:"Model 20", thumb:"images/thumbs/20.jpg", poster:"images/fulls/20.jpg", src:"models/model20.glb" },
  ];

  // ─────────────────────────────────────────────────────────
  //  ENVIRONMENT DATA
  //
  //  Color backgrounds: just a CSS background on the viewer.
  //
  //  HDR environments: drop your .hdr files into assets/hdrs/
  //  and update the `hdr` paths below.
  //    skybox: false  →  lighting only (background stays as CSS color)
  //    skybox: true   →  HDR image fills the background too
  // ─────────────────────────────────────────────────────────
  const ENVS = [
    { id:"white",   label:"White",   type:"color", bg:"#F6F8FC", swatch:"#F6F8FC" },
    { id:"warm",    label:"Warm",    type:"color", bg:"#F3EDE0", swatch:"#F3EDE0" },
    { id:"grey",    label:"Grey",    type:"color", bg:"#DFE2E9", swatch:"#DFE2E9" },
    { id:"dark",    label:"Dark",    type:"color", bg:"radial-gradient(circle at center, #484b69 0%, #171821 50%)", swatch:"#282B31" },
    { id:"hdr1",    label:"Studio",  type:"hdr",   hdr:"assets/hdrs/studio.hdr",  skybox:false },
    { id:"hdr2",    label:"Natural", type:"hdr",   hdr:"assets/hdrs/natural.hdr", skybox:false },
    { id:"hdr3",    label:"Outdoor", type:"hdr",   hdr:"assets/hdrs/outdoor.hdr", skybox:false  },
  ];

  // ─────────────────────────────────────────────────────────
  //  REFS & STATE
  // ─────────────────────────────────────────────────────────
  const mv          = document.getElementById('mv');
  const grid        = document.getElementById('model-grid');
  const envBar      = document.getElementById('env-bar');
  const loadingRing = document.getElementById('loading-ring');
  const infoName    = document.getElementById('info-name');
  const infoSub     = document.getElementById('info-sub');
  const searchEl    = document.getElementById('search');
  const panelCount  = document.getElementById('panel-count');
  const modelInfo   = document.getElementById('model-info');

  let activeId  = null;
  let activeEnv = null;

  // ─────────────────────────────────────────────────────────
  //  BUILD ENVIRONMENT BAR
  // ─────────────────────────────────────────────────────────
  function buildEnvBar() {
    envBar.innerHTML = '<span class="env-label">Scene</span>';

    ENVS.forEach(env => {
      const btn = document.createElement('button');
      btn.className = 'env-btn';
      btn.dataset.id = env.id;

      const icon = env.type === 'color'
        ? `<span class="env-swatch" style="background:${env.swatch};"></span>`
        : `<span class="env-globe" aria-hidden="true">
             <svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
               <circle cx="6" cy="6" r="4.5" stroke="rgba(30,60,120,0.55)" stroke-width="1.1"/>
               <path d="M1.5 6 Q4 4 6 6 Q8 8 10.5 6" stroke="rgba(30,60,120,0.55)" stroke-width="1" fill="none"/>
               <line x1="6" y1="1.5" x2="6" y2="10.5" stroke="rgba(30,60,120,0.4)" stroke-width="0.8"/>
             </svg>
           </span>`;

      btn.innerHTML = `${icon}<span>${env.label}</span>`;
      btn.addEventListener('click', () => applyEnv(env));
      envBar.appendChild(btn);
    });
  }

  // ─────────────────────────────────────────────────────────
  //  BUILD MODEL GRID
  // ─────────────────────────────────────────────────────────
  function buildGrid(models) {
    grid.innerHTML = '';
    panelCount.innerHTML = `${models.length} <em>piece${models.length !== 1 ? 's' : ''}</em>`;

    models.forEach((m, i) => {
      const card = document.createElement('button');
      card.className = 'model-card' + (m.id === activeId ? ' active' : '');
      card.dataset.id = m.id;
      card.style.cssText = `animation: fadeIn 0.35s ease both; animation-delay: ${i * 28}ms;`;

      card.innerHTML = `
        <img src="${m.thumb}" alt="${m.name}" loading="lazy"
             onerror="this.style.opacity='0.2'">
        <div class="card-label">${m.name}</div>
      `;

      card.addEventListener('click', () => loadModel(m));
      grid.appendChild(card);
    });
  }

  // ─────────────────────────────────────────────────────────
  //  LOAD MODEL
  //  1. Sets the poster image immediately → user sees the
  //     full-size photo at once (no blank screen).
  //  2. Starts loading the GLB in the background.
  //  3. model-viewer hides the poster automatically once
  //     the 3D model is ready (native lazy-load behaviour).
  // ─────────────────────────────────────────────────────────
  function loadModel(m) {
    if (m.id === activeId) return;
    activeId = m.id;

    // Card states
    document.querySelectorAll('.model-card').forEach(c => {
      const isActive = +c.dataset.id === m.id;
      c.classList.toggle('active', isActive);
      if (!isActive) c.classList.remove('loading');
    });
    const card = document.querySelector(`.model-card[data-id="${m.id}"]`);
    if (card) card.classList.add('loading');

    // Show full-size poster right away
    mv.setAttribute('poster', m.poster);

    // Show spinner
    loadingRing.classList.add('show');

    // Kick off the GLB load
    mv.src = m.src;

    // Update info strip with slide-up animation
    infoName.textContent = m.name;
    infoSub.textContent  = m.sub;
    modelInfo.style.animation = 'none';
    requestAnimationFrame(() => {
      modelInfo.style.animation = 'slideUp 0.38s ease both';
    });

    // Clean up once the model is ready
    const onLoad = () => {
      loadingRing.classList.remove('show');
      if (card) card.classList.remove('loading');
      mv.removeEventListener('load', onLoad);
    };
    mv.addEventListener('load', onLoad);
  }

  // ─────────────────────────────────────────────────────────
  //  APPLY ENVIRONMENT
  // ─────────────────────────────────────────────────────────
  function applyEnv(env) {
    activeEnv = env.id;

    document.querySelectorAll('.env-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.id === env.id);
    });

    if (env.type === 'color') {
      mv.style.background = env.bg;
      mv.setAttribute('environment-image', 'neutral');
      mv.removeAttribute('skybox-image');
    } else {
      mv.style.background = 'transparent';
      mv.setAttribute('environment-image', env.hdr);
      if (env.skybox) mv.setAttribute('skybox-image', env.hdr);
      else            mv.removeAttribute('skybox-image');
    }
  }

  // ─────────────────────────────────────────────────────────
  //  SEARCH
  // ─────────────────────────────────────────────────────────
  searchEl.addEventListener('input', e => {
    const q = e.target.value.trim().toLowerCase();
    buildGrid(q
      ? MODELS.filter(m => m.name.toLowerCase().includes(q) || m.sub.toLowerCase().includes(q))
      : MODELS
    );
  });

  // ─────────────────────────────────────────────────────────
  //  INIT
  // ─────────────────────────────────────────────────────────
  buildEnvBar();
  buildGrid(MODELS);
  applyEnv(ENVS[0]);     // default: white studio background
  loadModel(MODELS[0]);  // show first model on open
  </script>

</body>
</html>
