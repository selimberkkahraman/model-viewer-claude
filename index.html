<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stil — 3D Collection</title>

  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:       #1849A9;
      --blue-light: #EEF3FF;
      --blue-glow:  rgba(24,73,169,0.13);
      --bg:         #F5F7FC;
      --text:       #131B2E;
      --muted:      #7B87A1;
      --border:     rgba(24,73,169,0.10);
      --panel-w:    272px;
      --ease:       cubic-bezier(0.4,0,0.2,1);
    }

    html, body {
      width: 100%; height: 100%; overflow: hidden;
      font-family: 'Outfit', sans-serif;
      color: var(--text); background: var(--bg);
    }

    /* ── TOPBAR ──────────────────────────────────────────── */
    #topbar {
      position: fixed; top: 0; left: 0; right: var(--panel-w);
      height: 60px; display: flex; align-items: center;
      padding: 0 20px; z-index: 30; pointer-events: none;
    }
    .brand { display: flex; align-items: center; gap: 10px; pointer-events: all; }
    .brand-mark { width: 33px; height: 33px; background: var(--blue); border-radius: 9px; display: flex; align-items: center; justify-content: center; }
    .brand-mark svg { width: 17px; height: 17px; fill: #fff; }
    .brand-name { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text); }

    /* ── VIEWER ──────────────────────────────────────────── */
    #viewer-wrap {
      position: fixed; top: 0; left: 0; bottom: 0; right: var(--panel-w);
    }
    model-viewer {
      width: 100%; height: 100%; background: #F6F8FC;
      --progress-bar-color: var(--blue); --progress-mask: var(--blue-light);
    }
    /* Hide model-viewer's own AR button — only our custom #ar-btn should show */
    model-viewer::part(default-ar-button) { display: none !important; }

    /* ── AR BUTTON ───────────────────────────────────────────
       Positioned absolute inside #viewer-wrap.
       Hidden on desktop (display:none); shown by media queries.
       Uses mv.activateAR() directly — no slot="ar-button" so
       it's always visible on mobile regardless of AR availability.
       A toast message explains what's needed when AR can't start.
    ──────────────────────────────────────────────────────── */
    #ar-btn {
      position: absolute; top: 14px; right: 14px;
      display: none;                  /* shown only on mobile */
      align-items: center; gap: 7px;
      padding: 10px 16px 10px 11px;
      background: var(--blue); color: #fff;
      border: none; border-radius: 100px;
      font-family: 'Outfit', sans-serif;
      font-size: 13px; font-weight: 500;
      cursor: pointer; white-space: nowrap; z-index: 10;
      box-shadow: 0 4px 18px rgba(24,73,169,0.38);
      transition: all 0.2s var(--ease); letter-spacing: 0.02em;
    }
    #ar-btn:hover  { background: #1240C0; transform: translateY(-1px); }
    #ar-btn:active { transform: scale(0.97); }
    #ar-btn svg { width: 16px; height: 16px; fill: none; stroke: #fff; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }

    /* ── AR TOAST ────────────────────────────────────────── */
    #ar-toast {
      position: fixed; bottom: 200px; left: 50%;
      transform: translateX(-50%);
      background: rgba(19,27,46,0.9); backdrop-filter: blur(8px);
      color: #fff; border-radius: 14px;
      padding: 14px 20px; font-size: 12px; line-height: 1.6;
      max-width: 290px; text-align: left; z-index: 100;
      opacity: 0; transition: opacity 0.3s var(--ease); pointer-events: none;
      white-space: pre-line;
    }
    #ar-toast.show { opacity: 1; }

    /* ── MODEL INFO ──────────────────────────────────────── */
    #model-info { position: fixed; bottom: 94px; left: 24px; z-index: 20; pointer-events: none; }
    .info-tag  { font-size: 10px; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase; color: var(--blue); margin-bottom: 4px; }
    .info-name { font-family: 'Cormorant Garamond', serif; font-size: 40px; font-weight: 400; line-height: 1; color: var(--text); margin-bottom: 4px; }
    .info-sub  { font-size: 13px; font-weight: 300; color: var(--muted); letter-spacing: 0.04em; }

    /* ── ENV BAR ─────────────────────────────────────────── */
    #env-bar {
      position: fixed; bottom: 26px; left: 24px;
      right: calc(var(--panel-w) + 24px);
      z-index: 20; display: flex; align-items: center; gap: 7px;
      overflow-x: auto; scrollbar-width: none;
    }
    #env-bar::-webkit-scrollbar { display: none; }
    .env-label { font-size: 10px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); flex-shrink: 0; margin-right: 2px; }
    .env-btn {
      flex-shrink: 0; display: flex; align-items: center; gap: 7px;
      padding: 7px 12px 7px 8px; border-radius: 100px;
      border: 1.5px solid var(--border); background: rgba(255,255,255,0.86);
      backdrop-filter: blur(10px); cursor: pointer;
      font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 500;
      color: var(--muted); white-space: nowrap; outline: none;
      box-shadow: 0 2px 8px rgba(14,30,80,0.06);
      transition: all 0.22s var(--ease);
    }
    .env-btn:hover { border-color: rgba(24,73,169,0.32); color: var(--blue); background: var(--blue-light); transform: translateY(-1px); }
    .env-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; box-shadow: 0 4px 16px rgba(24,73,169,0.30); }
    .env-swatch { width: 19px; height: 19px; border-radius: 50%; flex-shrink: 0; border: 1.5px solid rgba(0,0,0,0.08); }
    .env-globe  { width: 19px; height: 19px; border-radius: 50%; flex-shrink: 0; background: linear-gradient(135deg,#b8cce8,#dde8f4 55%,#c4d4e8); border: 1.5px solid rgba(0,0,0,0.08); display: flex; align-items: center; justify-content: center; }
    .env-globe svg { width: 11px; height: 11px; }

    /* ── PANEL ───────────────────────────────────────────── */
    #panel {
      position: fixed; top: 0; right: 0; bottom: 0; width: var(--panel-w);
      display: flex; flex-direction: column;
      background: rgba(255,255,255,0.94);
      backdrop-filter: blur(20px) saturate(180%);
      border-left: 1px solid var(--border);
      box-shadow: -5px 0 32px rgba(14,30,80,0.07); z-index: 25;
    }
    .panel-head { padding: 20px 15px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .panel-title { font-size: 10px; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); margin-bottom: 2px; }
    #panel-count { font-family: 'Cormorant Garamond', serif; font-size: 19px; font-weight: 500; color: var(--text); margin-bottom: 12px; }
    #panel-count em { color: var(--blue); font-style: normal; }
    .search-wrap { position: relative; }
    .search-wrap svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
    #search {
      width: 100%; padding: 8px 10px 8px 29px;
      border: 1.5px solid var(--border); border-radius: 8px;
      background: var(--bg); font-family: 'Outfit', sans-serif;
      font-size: 12px; color: var(--text); outline: none;
      transition: all 0.2s var(--ease);
    }
    #search:focus { border-color: var(--blue); background: #fff; box-shadow: 0 0 0 3px var(--blue-glow); }
    #search::placeholder { color: var(--muted); }
    #model-grid {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 11px;

      display: grid;
      grid-template-columns: repeat(2, 120px);
      gap: 8px;

      scrollbar-width: thin; scrollbar-color: rgba(24,73,169,0.14) transparent;
    }
    #model-grid::-webkit-scrollbar { width: 3px; }
    #model-grid::-webkit-scrollbar-thumb { background: rgba(24,73,169,0.16); border-radius: 3px; }

    /* ── MODEL CARDS ─────────────────────────────────────── */
    .model-card {
      position: relative; border-radius: 10px; overflow: hidden;
      cursor: pointer; border: 2px solid transparent;
      background: var(--bg);
      width: 120px;
      height: 120px;;
      transition: all 0.22s var(--ease);
      padding: 0; outline: none; display: block;
      min-width: 0;
    }
    .model-card:hover { border-color: rgba(24,73,169,0.24); box-shadow: 0 4px 16px rgba(24,73,169,0.09); transform: translateY(-2px); }
    .model-card.active { border-color: var(--blue); box-shadow: 0 0 0 1px var(--blue), 0 4px 16px rgba(24,73,169,0.16); }
    .model-card img { width: 100%; height: 100%; object-fit: contain; padding: 0px; display: block; transition: transform 0.32s var(--ease); }
    .model-card:hover img { transform: scale(1.05); }
    .card-label {
      position: absolute; bottom: 0; left: 0; right: 0; padding: 18px 7px 5px;
      background: linear-gradient(to top, rgba(255,255,255,0.97), transparent);
      font-size: 10px; font-weight: 500; color: var(--text);
      text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .model-card.active::after { content: ''; position: absolute; top: 6px; right: 6px; width: 7px; height: 7px; border-radius: 50%; background: var(--blue); box-shadow: 0 0 0 2px #fff; }
    .model-card.loading::before { content: ''; position: absolute; inset: 0; z-index: 2; background: linear-gradient(90deg, transparent, rgba(24,73,169,0.07), transparent); animation: shimmer 1.3s infinite; }

    /* ── LOADING RING ────────────────────────────────────── */
    #loading-ring {
      position: fixed; top: 50%;
      left: calc((100vw - var(--panel-w)) / 2);
      transform: translate(-50%, -50%);
      z-index: 15; opacity: 0;
      transition: opacity 0.25s var(--ease); pointer-events: none;
    }
    #loading-ring.show { opacity: 1; }
    .ring { width: 44px; height: 44px; border-radius: 50%; border: 3px solid var(--blue-light); border-top-color: var(--blue); animation: spin 0.72s linear infinite; }

    /* ── ANIMATIONS ──────────────────────────────────────── */
    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes shimmer { from { transform: translateX(-100%); } to { transform: translateX(100%); } }
    @keyframes slideUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn  { from { opacity:0; } to { opacity:1; } }


    /* ════════════════════════════════════════════════════════
       FIX 1 — PORTRAIT PHONE  (≤ 700px wide, portrait)

       Problem: viewer was bottom:0, so model-viewer centered
       the model in the full viewport height — visually too low
       because the 148px bottom strip covered the bottom.

       Fix: set viewer bottom = 148px (the strip height).
       Now model-viewer only knows about the visible area and
       centers the model there correctly.
    ════════════════════════════════════════════════════════ */
    @media (max-width: 700px) and (orientation: portrait) {
      :root { --panel-w: 0px; }

      #topbar { right: 0; }

      /* KEY FIX: viewer stops where the strip starts */
      #viewer-wrap { right: 0; bottom: 148px; }

      /* Poster image: shift up to match the 3D model's visual center */
      model-viewer::part(default-poster) { background-position: center 35%; }

      /* AR button below topbar */
      #ar-btn { display: flex; top: 14px; right: 14px; }

      /* Model info and env bar sit within the visible viewer area */
      #model-info { bottom: 212px; left: 16px; }
      .info-name  { font-size: 30px; }
      #env-bar    { bottom: 158px; left: 12px; right: 12px; }

      /* Ring centered in visible viewer, not full viewport */
      #loading-ring { left: 50%; top: calc(50vh - 74px); }
      /* 50vh - 74px = midpoint of (0 to viewport-148px) area */

      /* Bottom strip */
      #panel {
        top: auto; bottom: 0; left: 0; right: 0;
        width: 100%; height: 148px;
        border-left: none; border-top: 1px solid var(--border);
        box-shadow: 0 -4px 24px rgba(14,30,80,0.07);
      }
      .panel-head { display: none; }

      /* Horizontal scroll strip */
      #model-grid {
        display: flex; flex-direction: row;
        overflow-x: auto; overflow-y: hidden;
        height: 148px; padding: 10px 12px;
        gap: 8px; align-items: center;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        scrollbar-width: none;
      }
      #model-grid::-webkit-scrollbar { display: none; }
      .model-card { flex-shrink: 0; width: 108px; height: 90px; aspect-ratio: unset; transform: none !important; }
      .model-card:active { opacity: 0.82; }
    }


    /* ════════════════════════════════════════════════════════
       FIX 2 — LANDSCAPE PHONE  (landscape, ≤500px tall, ≤900px wide)

       Problem: the portrait strip layout was bleeding into
       landscape, or the desktop layout was too wide.

       Fix: explicit landscape-phone rule that restores the
       desktop-style side panel with a narrower width (220px)
       and compact spacing for the short screen height.
    ════════════════════════════════════════════════════════ */
    @media (orientation: landscape) and (max-height: 600px) and (max-width: 900px) {
      :root { --panel-w: 220px; }

      /* Topbar only over viewer */
      #topbar { right: var(--panel-w); }

      /* Full-height viewer, panel on the right */
      #viewer-wrap { right: var(--panel-w); bottom: 0; }

      /* AR button */
      #ar-btn { display: flex; top: 14px; right: 14px; font-size: 12px; padding: 8px 13px 8px 10px; }

      /* Compact info/env for short screens */
      #model-info { bottom: 58px; left: 16px; }
      .info-name  { font-size: 26px; }
      #env-bar    { bottom: 12px; left: 16px; right: calc(var(--panel-w) + 14px); }

      /* Ring centered in viewer area */
      #loading-ring { left: calc((100vw - var(--panel-w)) / 2); top: 50%; }

      /* Side panel — desktop layout */
      #panel {
        top: 0; right: 0; bottom: 0;
        width: var(--panel-w); height: auto;
        border-left: 1px solid var(--border); border-top: none;
        box-shadow: -5px 0 32px rgba(14,30,80,0.07);
      }

      /* Show header with search */
      .panel-head { display: block; padding: 14px 12px 10px; }
      #panel-count { font-size: 16px; margin-bottom: 8px; }

      /* 2-column scrollable grid */
      #model-grid {
        flex: 1; min-height: 0;
        display: grid; grid-template-columns: 1fr 1fr;
        overflow-y: auto; overflow-x: hidden;
        align-content: start; gap: 7px; padding: 8px;
      }
      .model-card { aspect-ratio: auto; width: auto; height: auto; flex-shrink: unset; }
      .model-card:hover { transform: translateY(-2px); }
    }
  </style>
</head>
<body>

  <!-- TOPBAR -->
  <div id="topbar">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 18 13" xmlns="http://www.w3.org/2000/svg">
          <rect x="2"   y="4.5" width="14"  height="6.5" rx="2"/>
          <rect x="0.5" y="6.5" width="2.5" height="4.5" rx="1.25"/>
          <rect x="15"  y="6.5" width="2.5" height="4.5" rx="1.25"/>
          <rect x="3.5" y="2.5" width="11"  height="3.5" rx="1.2"/>
        </svg>
      </div>
      <span class="brand-name">Stil</span>
    </div>
  </div>

  <!-- VIEWER -->
  <div id="viewer-wrap">
    <model-viewer
      id="mv"
      camera-controls
      camera-orbit="0deg 75deg 140%"
      max-camera-orbit="auto auto 140%"
      auto-rotate
      auto-rotate-delay="2500"
      rotation-per-second="10deg"
      touch-action="pan-y"
      shadow-intensity="0"
      shadow-softness="0.6"
      ar
      ar-modes="webxr scene-viewer quick-look">
    </model-viewer>

    <!--
      ── WHY AR ISN'T SHOWING ON iPhone ──────────────────────
      The old slot="ar-button" approach was silently hiding
      the button because neither AR mode was available:

        • quick-look  needs a .usdz file set as ios-src.
          Convert your .glb files with Apple's free
          "Reality Converter" app, then add
            ios: "models/modelXX.usdz"
          to each entry in MODELS[]. The code sets
          ios-src automatically when loading.

        • webxr needs HTTPS. Your local server runs on
          plain HTTP (192.168.x.x:5500).
          Quick fix for testing: install "ngrok" and run
            ngrok http 5500
          which gives you an https:// tunnel to your
          local server — then WebXR AR works instantly.

      The button below uses mv.activateAR() directly and
      always shows on mobile. Tapping it when AR isn't ready
      shows a clear message explaining the above.
      ──────────────────────────────────────────────────────── -->
    <button id="ar-btn">
      <svg viewBox="0 0 24 24">
        <path d="M1 7l5-3 6 3.5L18 4l5 3v10l-5 3-6-3.5L6 20l-5-3V7z"/>
        <path d="M12 7.5V21M6 20V11M18 17V7.5"/>
      </svg>
      View in your room
    </button>
  </div>

  <!-- AR TOAST -->
  <div id="ar-toast"></div>

  <!-- LOADING RING -->
  <div id="loading-ring"><div class="ring"></div></div>

  <!-- MODEL INFO -->
  <div id="model-info">
    <div class="info-tag">Collection</div>
    <div class="info-name" id="info-name">—</div>
    <div class="info-sub"  id="info-sub">Select a model</div>
  </div>

  <!-- ENV BAR -->
  <div id="env-bar"></div>

  <!-- PANEL -->
  <div id="panel">
    <div class="panel-head">
      <div class="panel-title">Models</div>
      <div id="panel-count">20 <em>pieces</em></div>
      <div class="search-wrap">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
          <circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M10.5 10.5 L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <input type="text" id="search" placeholder="Search models…" autocomplete="off">
      </div>
    </div>
    <div id="model-grid"></div>
  </div>

  <script>
  const MODELS = [
    { id:1,  name:"Stil Sofa",        sub:"Model 01", thumb:"images/thumbs/01.jpg", poster:"images/fulls/01.jpg", src:"models/model01.glb" },
    { id:2,  name:"Stil Armchair",    sub:"Model 02", thumb:"images/thumbs/02.jpg", poster:"images/fulls/02.jpg", src:"models/model02.glb" },
    { id:3,  name:"Aura Sofa",        sub:"Model 03", thumb:"images/thumbs/03.jpg", poster:"images/fulls/03.jpg", src:"models/model03.glb" },
    { id:4,  name:"Aura Armchair",    sub:"Model 04", thumb:"images/thumbs/04.jpg", poster:"images/fulls/04.jpg", src:"models/model04.glb" },
    { id:5,  name:"Soho Sofa",        sub:"Model 05", thumb:"images/thumbs/05.jpg", poster:"images/fulls/05.jpg", src:"models/model05.glb" },
    { id:6,  name:"Soho Armchair",    sub:"Model 06", thumb:"images/thumbs/06.jpg", poster:"images/fulls/06.jpg", src:"models/model06.glb" },
    { id:7,  name:"Porto Sofa",       sub:"Model 07", thumb:"images/thumbs/07.jpg", poster:"images/fulls/07.jpg", src:"models/model07.glb" },
    { id:8,  name:"Porto Armchair",   sub:"Model 08", thumb:"images/thumbs/08.jpg", poster:"images/fulls/08.jpg", src:"models/model08.glb" },
    { id:9,  name:"Tokyo Sofa",       sub:"Model 09", thumb:"images/thumbs/09.jpg", poster:"images/fulls/09.jpg", src:"models/model09.glb" },
    { id:10, name:"Tokyo Relax Sofa", sub:"Model 10", thumb:"images/thumbs/10.jpg", poster:"images/fulls/10.jpg", src:"models/model10.glb" },
    { id:11, name:"Tokyo Armchair",   sub:"Model 11", thumb:"images/thumbs/11.jpg", poster:"images/fulls/11.jpg", src:"models/model11.glb" },
    { id:12, name:"Garda Sofa",       sub:"Model 12", thumb:"images/thumbs/12.jpg", poster:"images/fulls/12.jpg", src:"models/model12.glb" },
    { id:13, name:"Garda Relax Sofa", sub:"Model 13", thumb:"images/thumbs/13.jpg", poster:"images/fulls/13.jpg", src:"models/model13.glb" },
    { id:14, name:"Garda Armchair",   sub:"Model 14", thumb:"images/thumbs/14.jpg", poster:"images/fulls/14.jpg", src:"models/model14.glb" },
    { id:15, name:"West Sofa",        sub:"Model 15", thumb:"images/thumbs/15.jpg", poster:"images/fulls/15.jpg", src:"models/model15.glb" },
    { id:16, name:"West Relax Sofa",  sub:"Model 16", thumb:"images/thumbs/16.jpg", poster:"images/fulls/16.jpg", src:"models/model16.glb" },
    { id:17, name:"West Armchair",    sub:"Model 17", thumb:"images/thumbs/17.jpg", poster:"images/fulls/17.jpg", src:"models/model17.glb" },
    { id:18, name:"Kano Sofa",        sub:"Model 18", thumb:"images/thumbs/18.jpg", poster:"images/fulls/18.jpg", src:"models/model18.glb" },
    { id:19, name:"Kano Relax Sofa",  sub:"Model 19", thumb:"images/thumbs/19.jpg", poster:"images/fulls/19.jpg", src:"models/model19.glb" },
    { id:20, name:"Kano Armchair",    sub:"Model 20", thumb:"images/thumbs/20.jpg", poster:"images/fulls/20.jpg", src:"models/model20.glb" },
    { id:21, name:"Nobu Relax Sofa",  sub:"Model 21", thumb:"images/thumbs/21.jpg", poster:"images/fulls/21.jpg", src:"models/model21.glb" },
    { id:22, name:"Nobu Sofa",        sub:"Model 22", thumb:"images/thumbs/22.jpg", poster:"images/fulls/22.jpg", src:"models/model22.glb" },
    { id:23, name:"Nobu Armchair",    sub:"Model 23", thumb:"images/thumbs/23.jpg", poster:"images/fulls/23.jpg", src:"models/model23.glb" },
    // Add ios: "models/modelXX.usdz" to any entry that has a converted USDZ file
  ];

  const ENVS = [
    { id:"white",  label:"White",   type:"color", bg:"#F6F8FC", swatch:"#F6F8FC" },
    { id:"warm",   label:"Warm",    type:"color", bg:"#F3EDE0", swatch:"#F3EDE0" },
    { id:"grey",   label:"Grey",    type:"color", bg:"#DFE2E9", swatch:"#DFE2E9" },
    { id:"dark",   label:"Dark",    type:"color", bg:"#282B31", swatch:"#282B31" },
    { id:"hdr1",   label:"Studio",  type:"hdr",   hdr:"assets/hdrs/studio.hdr",  skybox:false },
    { id:"hdr2",   label:"Natural", type:"hdr",   hdr:"assets/hdrs/natural.hdr", skybox:false },
    { id:"hdr3",   label:"Outdoor", type:"hdr",   hdr:"assets/hdrs/outdoor.hdr", skybox:false  },
  ];

  const mv          = document.getElementById('mv');
  const grid        = document.getElementById('model-grid');
  const envBar      = document.getElementById('env-bar');
  const loadingRing = document.getElementById('loading-ring');
  const infoName    = document.getElementById('info-name');
  const infoSub     = document.getElementById('info-sub');
  const searchEl    = document.getElementById('search');
  const panelCount  = document.getElementById('panel-count');
  const modelInfo   = document.getElementById('model-info');
  const arBtn       = document.getElementById('ar-btn');
  const arToast     = document.getElementById('ar-toast');

  let activeId = null;
  let toastTimer = null;

  function showToast(msg) {
    arToast.textContent = msg;
    arToast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => arToast.classList.remove('show'), 6000);
  }

  // ── ENV BAR ────────────────────────────────────────────
  function buildEnvBar() {
    envBar.innerHTML = '<span class="env-label">Scene</span>';
    ENVS.forEach(env => {
      const btn = document.createElement('button');
      btn.className = 'env-btn'; btn.dataset.id = env.id;
      const icon = env.type === 'color'
        ? `<span class="env-swatch" style="background:${env.swatch};"></span>`
        : `<span class="env-globe"><svg viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="4.5" stroke="rgba(30,60,120,0.55)" stroke-width="1.1"/><path d="M1.5 6Q4 4 6 6Q8 8 10.5 6" stroke="rgba(30,60,120,0.55)" stroke-width="1" fill="none"/><line x1="6" y1="1.5" x2="6" y2="10.5" stroke="rgba(30,60,120,0.4)" stroke-width="0.8"/></svg></span>`;
      btn.innerHTML = `${icon}<span>${env.label}</span>`;
      btn.addEventListener('click', () => applyEnv(env));
      envBar.appendChild(btn);
    });
  }

  // ── MODEL GRID ─────────────────────────────────────────
  function buildGrid(models) {
    grid.innerHTML = '';
    panelCount.innerHTML = `${models.length} <em>piece${models.length !== 1 ? 's' : ''}</em>`;
    models.forEach((m, i) => {
      const card = document.createElement('button');
      card.className = 'model-card' + (m.id === activeId ? ' active' : '');
      card.dataset.id = m.id;
      card.style.cssText = `animation:fadeIn 0.35s ease both;animation-delay:${i * 28}ms`;
      card.innerHTML = `<img src="${m.thumb}" alt="${m.name}" loading="lazy" onerror="this.style.opacity='0.2'"><div class="card-label">${m.name}</div>`;
      card.addEventListener('click', () => loadModel(m));
      grid.appendChild(card);
    });
  }

  // ── LOAD MODEL ─────────────────────────────────────────
  function loadModel(m) {
    if (m.id === activeId) return;
    activeId = m.id;
    document.querySelectorAll('.model-card').forEach(c => {
      const match = +c.dataset.id === m.id;
      c.classList.toggle('active', match);
      if (!match) c.classList.remove('loading');
    });
    const card = document.querySelector(`.model-card[data-id="${m.id}"]`);
    if (card) card.classList.add('loading');
    mv.setAttribute('poster', m.poster);
    if (m.ios) mv.setAttribute('ios-src', m.ios);
    else       mv.removeAttribute('ios-src');
    loadingRing.classList.add('show');
    mv.src = m.src;
    infoName.textContent = m.name;
    infoSub.textContent  = m.sub;
    modelInfo.style.animation = 'none';
    requestAnimationFrame(() => { modelInfo.style.animation = 'slideUp 0.38s ease both'; });
    const onLoad = () => {
      loadingRing.classList.remove('show');
      if (card) card.classList.remove('loading');
      mv.removeEventListener('load', onLoad);
    };
    mv.addEventListener('load', onLoad);
  }

  // ── APPLY ENVIRONMENT ──────────────────────────────────
  function applyEnv(env) {
    document.querySelectorAll('.env-btn').forEach(b => b.classList.toggle('active', b.dataset.id === env.id));
    if (env.type === 'color') {
      mv.style.background = env.bg;
      mv.setAttribute('environment-image', 'neutral');
      mv.removeAttribute('skybox-image');
    } else {
      mv.style.background = 'transparent';
      mv.setAttribute('environment-image', env.hdr);
      if (env.skybox) mv.setAttribute('skybox-image', env.hdr);
      else            mv.removeAttribute('skybox-image');
    }
  }

  // ── SEARCH ─────────────────────────────────────────────
  searchEl.addEventListener('input', e => {
    const q = e.target.value.trim().toLowerCase();
    buildGrid(q ? MODELS.filter(m => m.name.toLowerCase().includes(q) || m.sub.toLowerCase().includes(q)) : MODELS);
  });

  // ── INIT ───────────────────────────────────────────────
  
  // ── AR BUTTON ──────────────────────────────────────────
  // iOS AR only works in Safari. If the user is on Chrome/Firefox/etc.
  // on iOS, we redirect to the same URL in Safari using the
  // x-safari-https:// scheme, which iOS handles natively.
  arBtn.addEventListener('click', () => {
    const ua = navigator.userAgent;
    const isIOS     = /iPad|iPhone|iPod/.test(ua);
    const isSafari  = /Safari/.test(ua) &&
                      !/CriOS/.test(ua) &&   // Chrome iOS
                      !/Chrome/.test(ua) &&
                      !/FxiOS/.test(ua) &&   // Firefox iOS
                      !/OPiOS/.test(ua);     // Opera iOS

    // Non-Safari iOS: redirect to same page in Safari
    if (isIOS && !isSafari) {
      showToast('AR requires Safari on iPhone.\nOpening Safari now…');
      setTimeout(() => {
        window.location.href = window.location.href
          .replace(/^https:\/\//, 'x-safari-https://')
          .replace(/^http:\/\//, 'x-safari-http://');
      }, 1200);
      return;
    }

    // Safari iOS or Android: try AR directly
    if (mv.canActivateAR) {
      mv.activateAR();
    } else {
      showToast(
        'AR not available right now.\n\n' +
        'Make sure you\'re on Safari (iOS) or Chrome (Android).\n' +
        'For Quick Look on iPhone, add .usdz files:\n' +
        '  ios: "models/modelXX.usdz"  in each MODELS entry.'
      );
    }
  });

  buildEnvBar();
  buildGrid(MODELS);
  applyEnv(ENVS[0]);
  loadModel(MODELS[0]);
  </script>

</body>
</html>
